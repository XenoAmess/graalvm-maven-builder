name: Build and Publish Builder Image

on:
  push:
    branches: [ master ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: xenoamess/graalvm-maven-builder
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: xenoamess/graalvm-maven-builder
  TAG_PREFIX: jdk21-maven3.9.16

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v7

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Check Docker Hub credentials
      id: dockerhub
      run: |
        if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
          echo "available=true" >> "$GITHUB_OUTPUT"
        else
          echo "available=false" >> "$GITHUB_OUTPUT"
          echo "::warning::DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are not set; skipping Docker Hub publish."
        fi

    - name: Log in to Docker Hub
      if: steps.dockerhub.outputs.available == 'true'
      uses: docker/login-action@v4
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Generate timestamp tag
      id: vars
      run: echo "timestamp=$(date +%Y%m%d_%H%M%S)" >> "$GITHUB_OUTPUT"

    - name: Build and push to GHCR
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/Dockerfile_builder
        push: true
        tags: |
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_PREFIX }}-latest
          ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.TAG_PREFIX }}-${{ steps.vars.outputs.timestamp }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build and push to Docker Hub
      if: steps.dockerhub.outputs.available == 'true'
      uses: docker/build-push-action@v7
      with:
        context: .
        file: ./docker/Dockerfile_builder
        push: true
        tags: |
          ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ env.TAG_PREFIX }}-latest
          ${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${{ env.TAG_PREFIX }}-${{ steps.vars.outputs.timestamp }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
